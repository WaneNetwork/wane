[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc = "0.8.27"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
via_ir = false
ffi = false
fs_permissions = [{ access = "read", path = "./" }]
gas_reports = ["WaneRegistry", "WanePolicy", "WaneDelegate", "WaneToken", "WaneHook"]
verbosity = 2
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "openzeppelin-contracts/=lib/openzeppelin-contracts/",
    "v4-core/=lib/v4-core/",
    "@uniswap/v4-core/=lib/v4-core/",
]

[profile.ci]
verbosity = 3
fuzz = { runs = 1000 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
multiline_func_header = "attributes_first"

[fuzz]
runs = 256
max_test_rejects = 65536

[invariant]
runs = 256
depth = 15
fail_on_revert = false

[rpc_endpoints]
base = "${BASE_RPC_URL}"

[etherscan]
base = { key = "${BASESCAN_API_KEY}", chain = 8453, url = "https://api.basescan.org/api" }
